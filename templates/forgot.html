<html>
<head>
  <style>
.popup{
    position: fixed;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    min-width: 420px;
    max-width: 90%;
    padding: 16px 25px;

    background: linear-gradient(135deg,#2563eb,#3b82f6);
    color: #fff;

    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.2);

    font-size: 16px;
    font-weight: 600;
    text-align: center;

    box-shadow:
        0 10px 30px rgba(37,99,235,.35),
        0 0 18px rgba(59,130,246,.35);

    backdrop-filter: blur(8px);
    z-index: 9999;

    animation: popupShow .5s ease;
}

@keyframes popupShow{

    0%{
        opacity:0;
        transform:translate(-50%,-30px) scale(.9);
    }

    100%{
        opacity:1;
        transform:translate(-50%,0) scale(1);
    }

}
</style>
  
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="../static/forgot.css">
</head>
<body>

  {% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
    {% for category, message in messages %}
        <div id="popup" class="popup">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
{% endwith %}




  <div class="forgot-container">
    <form action="/forgot-password" method="POST">
      <h2>Forgot Password</h2>
      <p>Enter your registered email to reset your password.</p>
      
      <input type="email" placeholder="Enter your email" name="email" required>

      <button type="submit">Send Reset Link</button>

      <div class="back">
        <a href="/login" onclick="window.location.replace('/login'); return false;">
          ← Back to Login
        </a>
      </div>
    </form>
  </div>

<script>
  history.replaceState(null, "", "/forgot");

  window.addEventListener("popstate", function () {
    window.location.href = "/login";
  });
</script>


<script>
setTimeout(function(){
    let popup = document.getElementById("popup");
    if (popup){
        popup.style.display = "none";
    }
}, 3000);
</script>

</body>
</html>
