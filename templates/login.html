<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LOGIN</title>
  <link rel="stylesheet" href="../static/login.css"> <!-- Make sure this path matches the CSS below -->
</head>
<body>
  <div class="login-box">
    <h2>LOGIN</h2>
    <form id="loginForm">
      <div class="user-box">
        <input type="text" name="username" id="username" required>
        <label>Username</label>
      </div>
      <div class="user-box">
        <input type="password" name="password" id="password" required>
        <label>Password</label>
      </div>
      <a href="/index" id="loginBtn">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        Login
      </a>

      <div class="button-row">


  <a href="/forgot" class="forgot-link">Forgot Password?</a>
</div>

    <a href="/register" onclick="submitForm()">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      Create an account
    </a>


  </form>
</div>

    </form>
  </div>

  <!-- ✅ Optional Glow Message (if you want to keep your success message) -->
  <style>
    #popup {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%) scale(0.95);
      padding: 15px 30px;
      background: #00ff99;
      color: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 16px;
      border-radius: 10px;
      box-shadow: 0 0 10px #00ff99, 0 0 20px #00ff99, 0 0 30px #00ff99;
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
      z-index: 9999;
      animation: glow-in 0.8s ease forwards;
    }

    @keyframes glow-in {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px) scale(0.9);
        box-shadow: 0 0 0px transparent;
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1);
        box-shadow: 0 0 10px #00ff99, 0 0 20px #00ff99, 0 0 30px #00ff99;
      }
    }

    #popup.hide {
      animation: fade-out 0.5s ease forwards;
    }

    @keyframes fade-out {
      to {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px) scale(0.9);
      }
    }
  </style>

  <script>
    // Show success popup from URL (if any)
    const params = new URLSearchParams(window.location.search);
    const popupMessage = params.get('msg');

    if (popupMessage) {
      const popup = document.createElement("div");
      popup.id = "popup";
      popup.textContent = `✅ ${popupMessage}`;
      document.body.appendChild(popup);

      setTimeout(() => popup.classList.remove('hide'), 50);
      setTimeout(() => popup.classList.add('hide'), 3000);

      popup.addEventListener('animationend', () => {
        if (popup.classList.contains('hide')) {
          popup.remove();
        }
      });

      history.replaceState(null, "", "/login");
    }

    // Submit the form when the animated <a> is clicked
    document.getElementById("loginBtn").addEventListener("click", async function (e) {
      e.preventDefault();

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const res = await fetch("http://localhost:5000/api/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (res.status === 200) {
        window.location.href = "/homemsg?msg=Login%20Successful!";
      } else {
        alert(data.error || "Login failed");
      }
    });
  </script>






</body>
</html>
