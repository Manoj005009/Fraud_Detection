<title>REGISTER</title>
<link rel="stylesheet" href="../static/regi.css" />
<div class="login-box">
  <h2>REGISTRATION</h2>
  <form id="registrationForm">
    <div class="user-box">
      <input type="text" name="username" required />
      <label>Username</label>
      <small class="error" id="username-error"></small>
    </div>

    <div class="user-box">
      <input type="email" name="email" required />
      <label>Email</label>
      <small class="error" id="email-error"></small>
    </div>

    <div class="user-box">
      <input type="password" name="password" required />
      <label>Password</label>
      <small class="error" id="password-error"></small>
    </div>


    
    <a href="#" onclick="submitForm(event)">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      Register
    </a>


    <a href="/login" class="glow-button">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      LOGIN
    </a>
  </p>
</div>

  </form>
</div>

<script>
  function showError(id, message) {
    const errorElem = document.getElementById(id);
    errorElem.textContent = message;
    errorElem.style.color = "red";
    errorElem.style.fontSize = "12px";
  }

  function clearErrors() {
    showError("username-error", "");
    showError("email-error", "");
    showError("password-error", "");
  }

  function isValidEmail(email) {
    // Simple email validation regex
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  async function submitForm(e) {
    e.preventDefault();
    clearErrors();

    const form = document.getElementById("registrationForm");
    const username = form.username.value.trim();
    const email = form.email.value.trim();
    const password = form.password.value.trim();

    let isValid = true;

    // Username validation
    if (username.length < 3) {
      showError("username-error", "Username must be at least 3 characters");
      isValid = false;
    }

    // Email validation
    if (!isValidEmail(email)) {
      showError("email-error", "Enter a valid email address");
      isValid = false;
    }

    // Password validation
    if (password.length < 6) {
      showError("password-error", "Password must be at least 6 characters");
      isValid = false;
    }

    if (!isValid) return;

    // If all good, continue with API call
    try {
      const res = await fetch("/api/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ user_name: username, email, password }),
      });

      const data = await res.json();

      if (res.status === 201) {
        window.location.href = `/login?msg=${encodeURIComponent(data.message)}`;
      } else {
        alert(data.error);
      }
    } catch (err) {
      alert("Something went wrong. Please try again later.");
    }
  }
</script>
